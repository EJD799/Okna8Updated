<!DOCTYPE html>
<html lang="ru-ru">

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Okna8</title>
</head>

<body>
    <section id="Section-OsBoot" class="Section-OsBoot">
        <img draggable="false" src="../img/BootLogo/BootLogoDefault.png" alt="">
        <div id="spinner" class="progress-ring">
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
            <div class="progress-ring__wrap">
                <div class="progress-ring__circle"></div>
            </div>
        </div>
        <h1 id="Section-OsBoot-text"></h1>
    </section>
    <script>
        window.addEventListener('message', (event) => {
            if (event.data == 'DisplayRing') {
                document.getElementById('spinner').style.display = "block"
            } else if (event.data == 'HideBootscreen') {
                document.getElementById('Section-OsBoot').style.animation = "fadeani 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards"
            } else if (event.data.startsWith('Boottext|')) {
                var text = event.data.substring(9)
                document.getElementById('Section-OsBoot-text').style.display = 'block'
                document.getElementById('Section-OsBoot-text').innerHtml = text
            }
        })
    </script>
    <style>
        body {
            background-color: black;
            overflow: hidden;
        }

        * {
            user-select: none;
        }

        section#Section-OsBoot {
            width: 1024px;
            height: 768px;
            background-color: black;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%) translateY(-50%);
        }

        section#Section-OsBoot img {
            position: absolute;
            left: 447px;
            top: 236px;
        }

        section#Section-OsBoot #spinner {
            scale: 0.6;
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        section#Section-OsBoot h1 {
            color: white;
            font-weight: 100;
            font-size: 28px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 90px;
            user-select: none;
            display: none;
            width: 100vw;
            text-align: center;
        }

        @keyframes fadeani {
            100% {
                opacity: 0;
            }
        }

        .progress-ring {
            position: relative;
            padding-top: 8px;
            width: 40px;
            height: 40px;
            margin: auto;
        }

        .progress-ring .progress-ring__wrap {
            position: absolute;
            width: 38px;
            height: 38px;
        }

        .progress-ring .progress-ring__wrap .progress-ring__circle {
            transform: rotate(225deg);
            animation-iteration-count: infinite;
            animation-name: orbit;
            animation-duration: 4000ms;
            width: 38px;
            height: 38px;
            opacity: 0;
        }

        .progress-ring .progress-ring__wrap .progress-ring__circle:after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 6px;
            background: #ffffff;
        }

        .progress-ring .progress-ring__wrap:nth-child(2) {
            transform: rotate(-14deg);
        }

        .progress-ring .progress-ring__wrap:nth-child(2) .progress-ring__circle {
            animation-delay: 133.33333333ms;
        }

        .progress-ring .progress-ring__wrap:nth-child(3) {
            transform: rotate(-28deg);
        }

        .progress-ring .progress-ring__wrap:nth-child(3) .progress-ring__circle {
            animation-delay: 266.66666667ms;
        }

        .progress-ring .progress-ring__wrap:nth-child(4) {
            transform: rotate(-42deg);
        }

        .progress-ring .progress-ring__wrap:nth-child(4) .progress-ring__circle {
            animation-delay: 400ms;
        }

        .progress-ring .progress-ring__wrap:nth-child(5) {
            transform: rotate(-56deg);
        }

        .progress-ring .progress-ring__wrap:nth-child(5) .progress-ring__circle {
            animation-delay: 533.33333333ms;
        }

        @keyframes orbit {
            0% {
                transform: rotate(225deg);
                opacity: 1;
                animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1)-out;
            }

            7% {
                transform: rotate(345deg);
                animation-timing-function: linear;
            }

            35% {
                transform: rotate(495deg);
                animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1)-in-out;
            }

            42% {
                transform: rotate(690deg);
                animation-timing-function: linear;
            }

            70% {
                transform: rotate(835deg);
                opacity: 1;
                animation-timing-function: linear;
            }

            76% {
                opacity: 1;
            }

            77% {
                transform: rotate(955deg);
                animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1)-in;
            }

            78% {
                transform: rotate(955deg);
                opacity: 0;
            }

            100% {
                transform: rotate(955deg);
                opacity: 0;
            }
        }
    </style>
</body>

</html>
