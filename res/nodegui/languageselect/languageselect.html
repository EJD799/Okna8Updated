<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <title>Okna8</title>
        <link rel="stylesheet" href="../mainpage/style.css">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="../../style/fonts.css">
        <link rel="stylesheet" href="../../style/metroui.css">
        <script src="../../script/jquery.js"></script>
        <script src="script.js"></script>
        <script src="../../ver.js"></script>
    </head>
    <body>
        <div class="header">
            <p>Okna8</p>
            <div class="fullscreenWarning">
                <div class="contents">
                    <h1>Okna8 now in fullscreen</h1>
                    <p>Menu bar and window buttons hidden. To exit fullscreen, press F11 on keyboard. This warning will not shown in the future.</p>
                    <button onclick="HideFullscreenWarning()">OK</button>
                </div>
                <div class="back"></div>
            </div>
            <div class="minimize" onclick="ipcRenderer.send('minimize')"></div>
            <div class="maximize" onclick="ipcRenderer.send('maximize')"></div>
            <div class="restore" onclick="ipcRenderer.send('restore')"></div>
            <div class="closebutton" onclick="window.close()"></div>
        </div>
        <div class="content">
            <h1>Welcome to Okna8</h1>
            <h2>Select language</h2>
            <select name="" id="LangSelect">
            </select>
            <button onclick="StartOkna()" id="StartButton">Start</button>
        </div>
    </body>
</html>
