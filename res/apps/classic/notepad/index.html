<!DOCTYPE html>
<html>
    <head>
        <title>Notepad</title>
        <link rel="stylesheet" href="../../../style/fonts.css">
        <link rel="stylesheet" href="../../../style/shellstyle.css">
        <link rel="stylesheet" href="style.css">
        <script src="../../../script/jquery.js"></script>
        <script src="../../../ver.js"></script>
        <script src="../../../script/ConnectScript.js"></script>
        <script src="../../../script/WindowsCommunication.js"></script>
        <script src="script.js"></script>
    </head>
    <body>
        <div class="menubar">
            <div class="element" id="MenuBarElement_file" onclick="MenuBar('file')">Файл</div>
            <div class="element" id="MenuBarElement_edit" onclick="MenuBar('edit')">Правка</div>
            <div class="element" id="MenuBarElement_format" onclick="MenuBar('format')">Формат</div>
            <div class="element" id="MenuBarElement_view" onclick="MenuBar('view')">Вид</div>
            <div class="element" id="MenuBarElement_help" onclick="MenuBar('help')">Справка</div>
        </div>
        <textarea spellcheck="false" id="NotepadTextarea"></textarea>
        <script>
            var WindowID

            window.addEventListener('message', function (event) {
                if (event.data.startsWith('YourID-')) {
                    WindowID = Number(event.data.replace('YourID-', ''))
                    sendToTop('SetWindowHeader' + WindowID + '|' + $('title').html())  
                    sendToTop('SetWindowIcon' + WindowID + '|' + 'apps/classic/notepad/notepad.png')
                    ConnectScript('MenuBar.js')
                }
            })

            function killWindow () {
                sendToTop('KillWindow_' + WindowID)
            }
        </script>
    </body>
</html>
