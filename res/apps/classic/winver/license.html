<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <style>
            html,body {
                background-color: rgb(240,240,240);
                margin:0
            }
            p {
                margin: 2px 50px;
            }
        </style>
        <link rel="stylesheet" href="../../../style/fonts.css">
        <link rel="stylesheet" href="../../../style/shellstyle.css">
        <script src="../../../script/JQuery.js"></script>
        <script src="../../../script/WindowsCommunication.js"></script>
        <script src="../../../ver.js"></script>
        <script src="../../../script/ConnectScript.js"></script>
        <script>      
            var WindowID
            var LOCALE_winver = []
            
            ConnectScript('../../../localization/' + localStorage.getItem('OKNA8_locale') + '/winver.js')

            window.addEventListener('message', function (event) {
                if (event.data.startsWith('YourID-')) {
                    WindowID = Number(event.data.replace('YourID-', ''))  
                    sendToTop('SetWindowHeader' + WindowID + '|' + LOCALE_winver[3]) 
                    $('.Buttons > button').html(LOCALE_winver[4])
                    $('iframe').attr('src', '../../../localization/' + localStorage.getItem('OKNA8_locale') + '/license.html')
                }
            })

            function killWindow () {
                sendToTop('KillWindow_' + WindowID)
            }
        </script>
    </head>
    <body>
        <iframe src="" style="width: 650px; height: 340px; background-color: white; margin: 10px;"></iframe>
        <div class="Buttons">
            <button onclick="killWindow()"></button>
        </div>
    </body>
</html>
