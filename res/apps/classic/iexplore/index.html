<!DOCTYPE html>
<html>
    <head>
        <title>Internet Explorer</title>
        <link rel="stylesheet" href="../../../style/fonts.css">
        <link rel="stylesheet" href="../../../style/shellstyle.css">
        <link rel="stylesheet" href="style.css">
        <script src="../../../script/jquery.js"></script>
        <script src="../../../script/ConnectScript.js"></script>
        <script src="../../../script/WindowsCommunication.js"></script>
        <script>
            var WindowID

            window.addEventListener('message', function (event) {
                if (event.data.startsWith('YourID-')) {
                    WindowID = Number(event.data.replace('YourID-', ''))
                    sendToTop('SetWindowHeader' + WindowID + '|' + $('title').html())  
                    sendToTop('SetWindowIcon' + WindowID + '|' + 'apps/classic/iexplore/icon.png')
                    ConnectScript('script.js')
                }
            })

            function killWindow () {
                sendToTop('KillWindow_' + WindowID)
            }
        </script>
    </head>
    <body>
        <div class="ieheader">
            <div class="travelButtons">
                <div class="back"></div>
                <div class="next"></div>
            </div>
        </div>
        <div class="tabs">
            <div class="tabContainer">
            </div>
            <div class="newtab" onclick="NewTab()"><div><img src="" alt=""></div></div>
        </div>
        <div class="frames">
        </div>
    </body>
</html>
